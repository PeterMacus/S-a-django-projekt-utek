{% extends 'core/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Zoznam tímov</h2>
    <a href="{% url 'team_create' %}" class="btn btn-success">+ Pridať tím</a>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Názov tímu</th>
                    <th>Vedúci</th>
                    <th>Akcie</th>
                </tr>
            </thead>
            <tbody>
                {% for team in teams %}
                <tr>
                    <td>{{ team.nazov_timu }}</td>
                    <td>{{ team.veduci_timu }}</td>
                    <td>
                        <a href="{% url 'team_detail' team.pk %}" class="btn btn-sm btn-outline-info">Detail</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center py-3">Zatiaľ neboli pridané žiadne tímy.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
