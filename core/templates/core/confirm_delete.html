{% extends 'core/base.html' %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h4>Naozaj chceš vymazať "{{ object }}"?</h4>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Áno, vymazať</button>
            <a href="javascript:history.back()" class="btn btn-secondary">Zrušiť</a>
        </form>
    </div>
</div>
{% endblock %}
