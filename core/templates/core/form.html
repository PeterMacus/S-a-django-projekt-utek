{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Vytvoriť / Upraviť záznam</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success">Uložiť</button>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">Zrušiť</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
